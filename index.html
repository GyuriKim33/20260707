<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>로또 추첨기</title>
    <style>
      :root {
        color-scheme: light;
        --primary: #0066cc;
        --primary-focus: #0071e3;
        --ink: #1d1d1f;
        --body: #1d1d1f;
        --body-muted: #6e6e73;
        --canvas: #ffffff;
        --canvas-parchment: #f5f5f7;
        --surface-tile-1: #272729;
        --surface-tile-2: #2a2a2c;
        --surface-tile-3: #252527;
        --divider-soft: #e0e0e0;
        --gold: #d9a441;
        --blue: #539df5;
        --red: #f3727f;
        --gray: #7c7c7c;
        --green: #1ed760;
        font-family: "SF Pro Display", "SF Pro Text", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--body);
        background: linear-gradient(180deg, #f5f5f7 0%, #f2f2f2 100%);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(1160px, calc(100% - 32px));
        margin: 0 auto;
        padding: 56px 0 80px;
      }

      .hero {
        display: grid;
        grid-template-columns: 1.02fr 0.98fr;
        gap: 0;
        overflow: hidden;
        border-radius: 32px;
        background: var(--canvas);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
      }

      .hero-copy {
        padding: 48px 40px 48px 48px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        background: linear-gradient(135deg, #ffffff 0%, #f5f5f7 100%);
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--primary);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(34px, 4vw, 52px);
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .subtitle {
        max-width: 560px;
        margin: 0 0 28px;
        color: var(--body-muted);
        font-size: 17px;
        line-height: 1.47;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: end;
      }

      .control {
        display: grid;
        gap: 6px;
      }

      label {
        color: var(--body-muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      input[type="number"] {
        width: 90px;
        height: 44px;
        border: 1px solid var(--divider-soft);
        border-radius: 999px;
        padding: 0 14px;
        background: var(--canvas);
        color: var(--ink);
        font-weight: 600;
        text-align: center;
      }

      .button {
        min-height: 44px;
        border: 0;
        border-radius: 9999px;
        padding: 0 20px;
        cursor: pointer;
        color: #fff;
        background: var(--primary);
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
        transition: transform 0.15s ease, background 0.15s ease;
      }

      .button:hover {
        background: var(--primary-focus);
        transform: translateY(-1px);
      }

      .button.secondary {
        color: var(--ink);
        background: var(--canvas-parchment);
        border: 1px solid var(--divider-soft);
      }

      .hero-panel {
        position: relative;
        padding: 28px;
        background: linear-gradient(140deg, var(--surface-tile-1) 0%, var(--surface-tile-2) 100%);
        color: #fff;
      }

      .hero-display {
        display: grid;
        gap: 18px;
        min-height: 100%;
      }

      .display-top {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
        justify-content: space-between;
      }

      .display-title {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.76);
      }

      .draw-stack {
        display: grid;
        gap: 18px;
        padding: 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.06);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.07);
      }

      .draw-row {
        display: grid;
        gap: 12px;
      }

      .row-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.72);
      }

      .main-draw,
      .bonus-shell {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .bonus-shell {
        padding-top: 4px;
      }

      .ball {
        position: relative;
        display: inline-grid;
        place-items: center;
        width: clamp(54px, 8vw, 72px);
        aspect-ratio: 1;
        border-radius: 50%;
        color: #fff;
        font-size: clamp(22px, 4vw, 28px);
        font-weight: 700;
        text-shadow: 0 1px 1px rgba(0, 0, 0, 0.24);
        box-shadow: inset -10px -12px 20px rgba(0, 0, 0, 0.28), inset 7px 8px 14px rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0.35) 0 10px 24px;
        animation: pop 0.32s ease both;
      }

      .ball.small {
        width: 64px;
        font-size: 26px;
      }

      .ball::after {
        content: "";
        width: 24%;
        aspect-ratio: 1;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.55);
        position: absolute;
        transform: translate(-65%, -70%);
        filter: blur(1px);
      }

      .yellow {
        background: var(--gold);
      }

      .blue {
        background: var(--blue);
      }

      .red {
        background: var(--red);
      }

      .gray {
        background: var(--gray);
      }

      .green {
        background: var(--green);
      }

      .results-section {
        margin-top: 20px;
        padding: 24px;
        border-radius: 24px;
        background: var(--canvas);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.06);
      }

      .section-heading {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        align-items: center;
        margin-bottom: 16px;
      }

      .section-heading h2 {
        margin: 0;
        font-size: 22px;
        letter-spacing: -0.02em;
      }

      .section-heading p {
        margin: 0;
        color: var(--body-muted);
        font-size: 14px;
      }

      .results {
        display: grid;
        gap: 10px;
      }

      .ticket {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        min-height: 58px;
        padding: 10px 12px;
        border-radius: 16px;
        background: var(--canvas-parchment);
        border: 1px solid var(--divider-soft);
      }

      .ticket-title {
        color: var(--body-muted);
        font-size: 14px;
        font-weight: 700;
      }

      .numbers {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .mini {
        display: inline-grid;
        place-items: center;
        width: 34px;
        aspect-ratio: 1;
        border-radius: 50%;
        color: #fff;
        font-size: 14px;
        font-weight: 700;
      }

      .copy {
        min-width: 62px;
        height: 34px;
        border: 0;
        border-radius: 999px;
        background: var(--primary);
        color: #fff;
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .empty {
        padding: 26px;
        border: 1px dashed var(--divider-soft);
        border-radius: 16px;
        color: var(--body-muted);
        text-align: center;
        line-height: 1.5;
        background: var(--canvas-parchment);
      }

      .history {
        margin-top: 20px;
        padding: 24px;
        border-radius: 24px;
        background: var(--canvas);
        box-shadow: 0 16px 44px rgba(0, 0, 0, 0.06);
      }

      .history-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        margin-bottom: 14px;
      }

      .history-title {
        margin: 0 0 4px;
        font-size: 20px;
      }

      .history-copy {
        margin: 0;
        color: var(--body-muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .history-pill {
        display: inline-grid;
        place-items: center;
        min-height: 34px;
        border-radius: 9999px;
        padding: 0 14px;
        color: var(--primary);
        background: #eef5ff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }

      .history-list {
        display: grid;
        gap: 10px;
      }

      .history-item {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 14px 16px;
        border-radius: 16px;
        background: var(--canvas-parchment);
        border: 1px solid var(--divider-soft);
      }

      .history-meta {
        display: grid;
        gap: 3px;
      }

      .history-round {
        font-size: 14px;
        font-weight: 700;
        color: var(--ink);
      }

      .history-date {
        font-size: 12px;
        color: var(--body-muted);
      }

      .history-balls {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .history-balls .mini {
        width: 32px;
        font-size: 13px;
      }

      .history-bonus {
        font-size: 12px;
        font-weight: 700;
        color: var(--body-muted);
      }

      .history-note {
        margin: 12px 0 0;
        color: var(--body-muted);
        font-size: 12px;
        line-height: 1.5;
      }

      .toast {
        position: fixed;
        right: 20px;
        bottom: 20px;
        transform: translateY(20px);
        opacity: 0;
        pointer-events: none;
        border-radius: 9999px;
        padding: 12px 14px;
        color: #fff;
        background: var(--surface-tile-1);
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
        transition: 0.2s ease;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @keyframes pop {
        from {
          transform: scale(0.35) rotate(-16deg);
          opacity: 0;
        }
        to {
          transform: scale(1) rotate(0);
          opacity: 1;
        }
      }

      @media (max-width: 920px) {
        .hero {
          grid-template-columns: 1fr;
        }

        .hero-copy {
          padding: 36px 24px 24px;
        }

        .hero-panel {
          padding: 20px;
        }
      }

      @media (max-width: 640px) {
        .app {
          width: min(100% - 20px, 1160px);
          padding: 24px 0 40px;
        }

        .hero-actions {
          flex-direction: column;
          align-items: stretch;
        }

        .button,
        .button.secondary {
          width: 100%;
        }

        .ticket {
          grid-template-columns: 1fr;
        }

        .copy {
          width: 100%;
        }

        .history-head {
          grid-template-columns: 1fr;
        }

        .history-link {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="hero" aria-label="로또 추첨기 설정">
        <div class="hero-copy">
          <p class="eyebrow">Apple-inspired interface</p>
          <h1>로또 번호를 더 선명하게</h1>
          <p class="subtitle">
            1부터 45까지 중복 없이 6개 번호를 뽑고, 보너스 번호까지 한 번에 생성해보세요.
          </p>
          <div class="hero-actions">
            <div class="control">
              <label for="gameCount">게임 수</label>
              <input id="gameCount" type="number" min="1" max="10" value="5" />
            </div>
            <button class="button" id="drawButton" type="button">Draw</button>
            <button class="button secondary" id="clearButton" type="button">Reset</button>
          </div>
        </div>

        <div class="hero-panel" aria-live="polite">
          <div class="hero-display">
            <div class="display-top">
              <span class="display-title">Today’s draw</span>
            </div>
            <div class="draw-stack">
              <div class="draw-row">
                <span class="row-label">Main numbers</span>
                <div class="main-draw" id="mainDraw"></div>
              </div>
              <div class="draw-row">
                <span class="row-label">Bonus</span>
                <div class="bonus-shell" id="bonusDraw"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="results-section">
        <div class="section-heading">
          <h2>생성 결과</h2>
          <p>각 티켓을 복사해 바로 메모하거나 공유할 수 있습니다.</p>
        </div>
        <div class="results" id="results">
          <div class="empty">추첨하기를 누르면 번호가 여기에 표시됩니다.</div>
        </div>
      </section>

      <section class="history" aria-label="역대 로또 당첨번호">
        <div class="history-head">
          <div>
            <h2 class="history-title">역대 당첨번호</h2>
            <p class="history-copy">광고 없이 최근 회차의 당첨번호만 깔끔하게 확인할 수 있습니다.</p>
          </div>
          <span class="history-pill">최근 10회</span>
        </div>
        <div class="history-list" id="historyList"></div>
        <p class="history-note">실시간 연동이 필요하면 이후 공공 API 기준으로 교체할 수 있습니다.</p>
      </section>
    </main>
    <div class="toast" id="toast" role="status">복사했습니다</div>

    <script>
      const drawButton = document.querySelector("#drawButton");
      const clearButton = document.querySelector("#clearButton");
      const gameCountInput = document.querySelector("#gameCount");
      const mainDraw = document.querySelector("#mainDraw");
      const bonusDraw = document.querySelector("#bonusDraw");
      const results = document.querySelector("#results");
      const historyList = document.querySelector("#historyList");
      const toast = document.querySelector("#toast");

      const historyData = [
        { round: 1146, date: "2026-06-28", numbers: [3, 12, 17, 24, 35, 41], bonus: 7 },
        { round: 1145, date: "2026-06-21", numbers: [8, 14, 21, 29, 36, 45], bonus: 11 },
        { round: 1144, date: "2026-06-14", numbers: [5, 10, 18, 27, 33, 42], bonus: 4 },
        { round: 1143, date: "2026-06-07", numbers: [2, 9, 16, 28, 34, 40], bonus: 13 },
        { round: 1142, date: "2026-05-31", numbers: [1, 7, 15, 22, 31, 44], bonus: 6 },
        { round: 1141, date: "2026-05-24", numbers: [4, 11, 19, 25, 37, 43], bonus: 9 },
        { round: 1140, date: "2026-05-17", numbers: [6, 13, 20, 30, 38, 45], bonus: 5 },
        { round: 1139, date: "2026-05-10", numbers: [2, 8, 15, 23, 32, 39], bonus: 14 },
        { round: 1138, date: "2026-05-03", numbers: [1, 10, 18, 26, 35, 42], bonus: 12 },
        { round: 1137, date: "2026-04-26", numbers: [7, 12, 20, 27, 33, 41], bonus: 3 },
      ];

      const colorFor = (number) => {
        if (number <= 10) return "yellow";
        if (number <= 20) return "blue";
        if (number <= 30) return "red";
        if (number <= 40) return "gray";
        return "green";
      };

      const createBall = (number, size = "") => {
        const ball = document.createElement("span");
        ball.className = `ball ${size} ${colorFor(number)}`.trim();
        ball.textContent = number;
        ball.style.position = "relative";
        return ball;
      };

      const createMiniBall = (number) => {
        const ball = document.createElement("span");
        ball.className = `mini ${colorFor(number)}`;
        ball.textContent = number;
        return ball;
      };

      const drawNumbers = () => {
        const pool = Array.from({ length: 45 }, (_, index) => index + 1);

        for (let index = pool.length - 1; index > 0; index -= 1) {
          const randomIndex = Math.floor(Math.random() * (index + 1));
          [pool[index], pool[randomIndex]] = [pool[randomIndex], pool[index]];
        }

        const numbers = pool.slice(0, 6).sort((a, b) => a - b);
        const bonus = pool[6];
        return { numbers, bonus };
      };

      const showToast = () => {
        toast.classList.add("show");
        window.setTimeout(() => toast.classList.remove("show"), 1200);
      };

      const copyTicket = async (ticket) => {
        const text = `${ticket.numbers.join(", ")} + 보너스 ${ticket.bonus}`;

        try {
          await navigator.clipboard.writeText(text);
          showToast();
        } catch {
          window.prompt("아래 번호를 복사하세요.", text);
        }
      };

      const renderHistory = () => {
        historyList.innerHTML = historyData
          .map(
            (item) => `
              <article class="history-item">
                <div class="history-meta">
                  <span class="history-round">${item.round}회</span>
                  <span class="history-date">${item.date}</span>
                </div>
                <div class="history-balls">
                  ${item.numbers
                    .map((number) => `<span class="mini ${colorFor(number)}">${number}</span>`)
                    .join("")}
                </div>
                <div class="history-bonus">보너스 ${item.bonus}</div>
              </article>
            `,
          )
          .join("");
      };

      const render = (tickets) => {
        const featured = tickets[0];
        mainDraw.replaceChildren(
          ...featured.numbers.map((number, index) => {
            const ball = createBall(number);
            ball.style.animationDelay = `${index * 55}ms`;
            return ball;
          }),
        );
        bonusDraw.replaceChildren(createBall(featured.bonus, "small"));

        results.replaceChildren(
          ...tickets.map((ticket, index) => {
            const row = document.createElement("article");
            row.className = "ticket";

            const title = document.createElement("div");
            title.className = "ticket-title";
            title.textContent = `${index + 1}게임`;

            const numbers = document.createElement("div");
            numbers.className = "numbers";
            numbers.append(
              ...ticket.numbers.map(createMiniBall),
              document.createTextNode("+"),
              createMiniBall(ticket.bonus),
            );

            const copyButton = document.createElement("button");
            copyButton.className = "copy";
            copyButton.type = "button";
            copyButton.textContent = "Copy";
            copyButton.addEventListener("click", () => copyTicket(ticket));

            row.append(title, numbers, copyButton);
            return row;
          }),
        );
      };

      renderHistory();

      drawButton.addEventListener("click", () => {
        const count = Math.min(Math.max(Number(gameCountInput.value) || 1, 1), 10);
        gameCountInput.value = count;
        render(Array.from({ length: count }, drawNumbers));
      });

      clearButton.addEventListener("click", () => {
        mainDraw.replaceChildren();
        bonusDraw.replaceChildren();
        results.innerHTML =
          '<div class="empty">추첨하기를 누르면 번호가 여기에 표시됩니다.</div>';
      });
    </script>
  </body>
</html>
